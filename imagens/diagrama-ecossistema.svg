  <rect x="60" y="710" width="1800" height="230" rx="12" fill="#fffde7" stroke="#d6b656" stroke-width="2"/>
  <text x="140" y="740" font-size="20" font-weight="bold" fill="#7a6000">DISPOSITIVOS FÍSICOS</text>

