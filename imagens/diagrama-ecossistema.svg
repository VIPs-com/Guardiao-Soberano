  <rect x="1600" y="315" width="230" height="310" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="1715" y="345" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a3a6a">🔵 Tails</text>
  <text x="1715" y="365" font-size="12" text-anchor="middle" fill="#555">USB</text>
  <line x1="1610" y1="375" x2="1820" y2="375" stroke="#6c8ebf" stroke-width="1"/>
  <text x="1715" y="398" font-size="12" text-anchor="middle" fill="#444">Ambiente</text>
  <text x="1715" y="416" font-size="12" text-anchor="middle" fill="#444">cirúrgico</text>
  <text x="1715" y="438" font-size="12" text-anchor="middle" fill="#444">Swaps alto</text>
  <text x="1715" y="456" font-size="12" text-anchor="middle" fill="#444">valor</text>
  <text x="1715" y="480" font-size="12" text-anchor="middle" fill="#444">Amnésia</text>
  <text x="1715" y="498" font-size="12" text-anchor="middle" fill="#444">total</text>

  <!-- Arrows between VMs -->
  <line x1="500" y1="470" x2="580" y2="470" stroke="#555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="1020" y1="470" x2="1100" y2="470" stroke="#555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="536" y="460" font-size="11" fill="#555" text-anchor="middle">rede interna</text>
  <text x="1056" y="460" font-size="11" fill="#555" text-anchor="middle">rede interna</text>

  <!-- Arrow air-gap -->
