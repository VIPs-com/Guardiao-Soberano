  <rect x="100" y="755" width="300" height="160" rx="10" fill="#ffcccc" stroke="#cc4444" stroke-width="1.5"/>
  <text x="250" y="783" font-size="15" font-weight="bold" text-anchor="middle" fill="#8a1a1a">🔐 Coldcard MK5</text>
