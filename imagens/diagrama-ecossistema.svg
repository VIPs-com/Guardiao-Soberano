<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="DejaVu Sans,Arial,sans-serif">
  <rect width="1920" height="1080" fill="#f8f8f8"/>
  <text x="960" y="38" font-size="26" font-weight="bold" text-anchor="middle" fill="#222">Ecossistema Guardião Soberano — Arquitetura Completa</text>

  <!-- INTERNET CLOUD (topo) -->
  <rect x="60" y="55" width="1800" height="160" rx="80" ry="80" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="960" y="90" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a3a6a">☁  INTERNET (REDE TOR)</text>
  <!-- Cloud boxes -->
  <rect x="120" y="105" width="360" height="80" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="300" y="142" font-size="15" text-anchor="middle" fill="#555">Coordinator Whirlpool</text>
  <text x="300" y="163" font-size="13" text-anchor="middle" fill="#888">.onion</text>

  <rect x="560" y="105" width="300" height="80" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="710" y="142" font-size="15" text-anchor="middle" fill="#555">eigenwallet</text>
  <text x="710" y="163" font-size="13" text-anchor="middle" fill="#888">.onion (BTC→XMR)</text>

  <rect x="940" y="105" width="340" height="80" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="1110" y="142" font-size="15" text-anchor="middle" fill="#555">Rede Bitcoin / Monero</text>
  <text x="1110" y="163" font-size="13" text-anchor="middle" fill="#888">peers via Tor</text>

  <rect x="1360" y="105" width="290" height="80" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="1505" y="142" font-size="15" text-anchor="middle" fill="#555">RoboSats</text>
  <text x="1505" y="163" font-size="13" text-anchor="middle" fill="#888">.onion (Pix→BTC)</text>

  <!-- Arrow Internet ↕ Host -->
  <line x1="960" y1="215" x2="960" y2="270" stroke="#6c8ebf" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="980" y="248" font-size="14" fill="#6c8ebf" font-style="italic">só via Tor</text>

  <!-- HOST FÍSICO container -->
  <rect x="60" y="270" width="1800" height="380" rx="12" fill="#f0f0f0" stroke="#666" stroke-width="2"/>
  <text x="140" y="300" font-size="20" font-weight="bold" fill="#333">HOST FÍSICO</text>

  <!-- Gateway VM -->
  <rect x="100" y="315" width="400" height="310" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="300" y="345" font-size="17" font-weight="bold" text-anchor="middle" fill="#2d6a2d">🌐 Whonix-Gateway</text>
  <text x="300" y="365" font-size="13" text-anchor="middle" fill="#555">10.152.152.10</text>
  <line x1="110" y1="375" x2="490" y2="375" stroke="#82b366" stroke-width="1"/>
  <text x="130" y="400" font-size="13" fill="#444">• Tor daemon</text>
  <text x="130" y="422" font-size="13" fill="#444">• Kill Switch</text>
  <text x="130" y="444" font-size="13" fill="#444">• Stream Isolation</text>
  <text x="130" y="466" font-size="13" fill="#444">• Firewall</text>
  <text x="130" y="488" font-size="13" fill="#444">• Nenhum tráfego</text>
  <text x="130" y="508" font-size="13" fill="#444">  sai sem Tor</text>

  <!-- Workstation VM -->
  <rect x="580" y="315" width="440" height="310" rx="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="800" y="345" font-size="17" font-weight="bold" text-anchor="middle" fill="#5a3a7a">💻 Whonix-Workstation</text>
  <text x="800" y="365" font-size="13" text-anchor="middle" fill="#555">10.152.152.20</text>
  <line x1="590" y1="375" x2="1010" y2="375" stroke="#9673a6" stroke-width="1"/>
  <text x="610" y="400" font-size="13" fill="#444">• Sparrow Wallet</text>
  <text x="610" y="422" font-size="13" fill="#444">• Whirlpool (Sparrow)</text>
  <text x="610" y="444" font-size="13" fill="#444">• eigenwallet</text>
  <text x="610" y="466" font-size="13" fill="#444">• Feather Wallet</text>
  <text x="610" y="488" font-size="13" fill="#444">• KeePassXC</text>
  <text x="610" y="510" font-size="13" fill="#444">• RetoSwap</text>
