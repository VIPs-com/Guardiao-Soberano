  <line x1="850" y1="790" x2="1110" y2="790" stroke="#888" stroke-width="1"/>
  <text x="980" y="815" font-size="13" text-anchor="middle" fill="#444">Local separado</text>
  <text x="980" y="838" font-size="13" text-anchor="middle" fill="#444">ou memorizada</text>
  <text x="980" y="862" font-size="12" text-anchor="middle" fill="#888">25ª palavra (BIP39)</text>
  <text x="980" y="882" font-size="12" text-anchor="middle" fill="#888">2ª fator físico</text>

  <!-- Mobile -->
  <rect x="1190" y="755" width="280" height="160" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="1330" y="783" font-size="15" font-weight="bold" text-anchor="middle" fill="#2d5a2d">📱 Celular</text>
  <line x1="1200" y1="790" x2="1460" y2="790" stroke="#82b366" stroke-width="1"/>
  <text x="1330" y="812" font-size="13" text-anchor="middle" fill="#444">CalyxOS / GrapheneOS</text>
  <text x="1330" y="832" font-size="13" text-anchor="middle" fill="#444">Watch-only</text>
  <text x="1330" y="855" font-size="12" text-anchor="middle" fill="#888">Sparrow + Feather</text>
  <text x="1330" y="875" font-size="12" text-anchor="middle" fill="#888">KeePassDX + Orbot</text>

  <!-- MicroSD -->
  <rect x="1540" y="755" width="280" height="160" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1680" y="783" font-size="15" font-weight="bold" text-anchor="middle" fill="#1a3a6a">💾 MicroSD (2x)</text>
  <line x1="1550" y1="790" x2="1810" y2="790" stroke="#6c8ebf" stroke-width="1"/>
  <text x="1680" y="812" font-size="13" text-anchor="middle" fill="#444">Ponte PSBT</text>
  <text x="1680" y="835" font-size="13" text-anchor="middle" fill="#444">Firmware update</text>
  <text x="1680" y="858" font-size="12" text-anchor="middle" fill="#888">Coldcard ↔ Sparrow</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
