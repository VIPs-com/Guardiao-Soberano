  <text x="620" y="812" font-size="13" text-anchor="middle" fill="#444">Seed backup (2x)</text>
  <text x="620" y="832" font-size="13" text-anchor="middle" fill="#444">Local A + Local B</text>
  <text x="620" y="855" font-size="12" text-anchor="middle" fill="#888">separados fisicamente</text>
  <text x="620" y="875" font-size="12" text-anchor="middle" fill="#888">resistem a fogo/água</text>

