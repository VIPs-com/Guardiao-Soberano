  <rect x="1100" y="315" width="430" height="310" rx="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="1315" y="345" font-size="17" font-weight="bold" text-anchor="middle" fill="#7a4a00">⛓️ Bitcoin-Node</text>
  <text x="1315" y="365" font-size="13" text-anchor="middle" fill="#555">10.152.152.30</text>
  <line x1="1110" y1="375" x2="1520" y2="375" stroke="#d79b00" stroke-width="1"/>
  <text x="1130" y="400" font-size="13" fill="#444">• Bitcoin Core</text>
  <text x="1130" y="422" font-size="13" fill="#444">• Fulcrum / EPS</text>
  <text x="1130" y="444" font-size="13" fill="#444">• Tor hidden service</text>
  <text x="1130" y="466" font-size="13" fill="#444">• .onion próprio</text>
  <text x="1130" y="488" font-size="13" fill="#444">• 400+ GB SSD</text>

