<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0d1e42"/>
      <stop offset="100%" stop-color="#060e22"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="245" fill="url(#bg2)"/>
  <circle cx="256" cy="256" r="245" fill="none" stroke="#5BB8F5" stroke-width="9" opacity="0.8"/>
  <!-- Snowflake: 3 axes crossing at center (256, 239) -->
  <g stroke="#5BB8F5" stroke-width="16" stroke-linecap="round">
    <line x1="256" y1="109" x2="256" y2="369"/>
    <line x1="256" y1="109" x2="256" y2="369" transform="rotate(60 256 239)"/>
    <line x1="256" y1="109" x2="256" y2="369" transform="rotate(120 256 239)"/>
  </g>
  <!-- Center hex -->
  <circle cx="256" cy="239" r="18" fill="#5BB8F5"/>
  <!-- Diamond tips at 6 ends -->
  <g fill="#5BB8F5" opacity="0.9">
    <ellipse cx="256" cy="109" rx="12" ry="18"/>
    <ellipse cx="256" cy="369" rx="12" ry="18"/>
    <ellipse cx="256" cy="109" rx="12" ry="18" transform="rotate(60 256 239)"/>
    <ellipse cx="256" cy="369" rx="12" ry="18" transform="rotate(60 256 239)"/>
    <ellipse cx="256" cy="109" rx="12" ry="18" transform="rotate(120 256 239)"/>
    <ellipse cx="256" cy="369" rx="12" ry="18" transform="rotate(120 256 239)"/>
  </g>
  <!-- NX label -->
  <text x="256" y="432" font-family="DejaVu Sans,Arial,sans-serif" font-size="70" font-weight="bold" text-anchor="middle" fill="#5BB8F5">N2</text>
</svg>
