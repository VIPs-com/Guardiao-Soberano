<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a2e2e"/>
      <stop offset="100%" stop-color="#051818"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="245" fill="url(#bg4)"/>
  <circle cx="256" cy="256" r="245" fill="none" stroke="#26C6C6" stroke-width="9" opacity="0.8"/>
  <!-- Circular arrow: large arc sweeps ~300 deg, ends with arrowhead -->
  <path d="M 344 148 A 120 120 0 1 1 168 148"
        stroke="#26C6C6" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Arrowhead pointing down-left at end of arc -->
  <polygon points="168,148 136,176 192,180" fill="#26C6C6"/>
  <!-- Input dots suggestion (3 small circles near top, before the loop) -->
  <g fill="#26C6C6" opacity="0.55">
    <circle cx="256" cy="113" r="10"/>
    <circle cx="228" cy="118" r="8"/>
    <circle cx="284" cy="118" r="8"/>
  </g>
  <!-- "CJ" hint in center -->
  <text x="256" y="252" font-family="DejaVu Sans,Arial,sans-serif" font-size="54" font-weight="bold" text-anchor="middle" fill="#26C6C6" opacity="0.45">CJ</text>
  <!-- NX label -->
  <text x="256" y="432" font-family="DejaVu Sans,Arial,sans-serif" font-size="70" font-weight="bold" text-anchor="middle" fill="#26C6C6">N4</text>
</svg>
