<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2a1400"/>
      <stop offset="100%" stop-color="#140a00"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="245" fill="url(#bg5)"/>
  <circle cx="256" cy="256" r="245" fill="none" stroke="#FFA040" stroke-width="9" opacity="0.8"/>
  <!-- BTC label (top-left) -->
  <text x="148" y="195" font-family="DejaVu Sans,Arial,sans-serif" font-size="38" font-weight="bold" text-anchor="middle" fill="#FFA040" opacity="0.85">BTC</text>
  <!-- XMR label (top-right) -->
  <text x="364" y="195" font-family="DejaVu Sans,Arial,sans-serif" font-size="38" font-weight="bold" text-anchor="middle" fill="#FFA040" opacity="0.85">XMR</text>
  <!-- Arrow: BTC → XMR (top, pointing right) -->
  <line x1="188" y1="218" x2="308" y2="218" stroke="#FFA040" stroke-width="14" stroke-linecap="round"/>
  <polygon points="320,218 296,204 296,232" fill="#FFA040"/>
  <!-- Arrow: XMR → BTC (bottom, pointing left) -->
  <line x1="324" y1="268" x2="204" y2="268" stroke="#FFA040" stroke-width="14" stroke-linecap="round"/>
  <polygon points="192,268 216,254 216,282" fill="#FFA040"/>
  <!-- XMR label (bottom-left) -->
  <text x="148" y="313" font-family="DejaVu Sans,Arial,sans-serif" font-size="38" font-weight="bold" text-anchor="middle" fill="#FFA040" opacity="0.85">XMR</text>
  <!-- BTC label (bottom-right) -->
  <text x="364" y="313" font-family="DejaVu Sans,Arial,sans-serif" font-size="38" font-weight="bold" text-anchor="middle" fill="#FFA040" opacity="0.85">BTC</text>
  <!-- NX label -->
  <text x="256" y="432" font-family="DejaVu Sans,Arial,sans-serif" font-size="70" font-weight="bold" text-anchor="middle" fill="#FFA040">N5</text>
</svg>
