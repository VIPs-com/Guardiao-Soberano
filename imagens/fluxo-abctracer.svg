<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" width="1100" height="680" font-family="DejaVu Sans,Arial,sans-serif">
  <rect width="1100" height="680" fill="#f8f8f8"/>
  <text x="550" y="36" font-size="22" font-weight="bold" text-anchor="middle" fill="#222">ABCTracer — Correlação Cross-Chain: Como se Defender</text>
  <text x="550" y="58" font-size="14" text-anchor="middle" fill="#666">arXiv:2504.01822 — 91.75% de sucesso sem defesa</text>

  <!-- Divider -->
  <line x1="540" y1="70" x2="540" y2="650" stroke="#888" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- ===== LEFT SIDE: SEM DEFESA ===== -->
  <text x="270" y="88" font-size="19" font-weight="bold" text-anchor="middle" fill="#cc0000">❌  SEM DEFESA</text>

  <!-- Event 1 -->
  <rect x="40" y="105" width="440" height="70" rx="10" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="260" y="133" font-size="15" font-weight="bold" text-anchor="middle" fill="#8a1a1a">14:00  →  1.0 BTC</text>
  <text x="260" y="155" font-size="13" text-anchor="middle" fill="#555">eigenwallet: 1 swap imediato, valor redondo</text>

  <!-- Arrow down -->
  <line x1="260" y1="175" x2="260" y2="215" stroke="#cc4444" stroke-width="2"/>
  <text x="330" y="198" font-size="13" fill="#cc4444" font-style="italic">25 minutos</text>

  <!-- Event 2 -->
  <rect x="40" y="215" width="440" height="70" rx="10" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="260" y="243" font-size="15" font-weight="bold" text-anchor="middle" fill="#8a1a1a">14:25  →  ~0.98 XMR aparece</text>
  <text x="260" y="265" font-size="13" text-anchor="middle" fill="#555">carteira Monero recebe o valor correspondente</text>

  <!-- Alert box -->
  <rect x="40" y="315" width="440" height="130" rx="12" fill="#cc0000" stroke="#990000" stroke-width="2.5"/>
  <text x="260" y="348" font-size="17" font-weight="bold" text-anchor="middle" fill="#FFFFFF">⚠️  ABCTracer detecta:</text>
  <text x="260" y="374" font-size="15" text-anchor="middle" fill="#FFCCCC">Intervalo: 25 minutos</text>
  <text x="260" y="398" font-size="15" text-anchor="middle" fill="#FFCCCC">Confiança: 91.75%</text>
  <text x="260" y="422" font-size="17" font-weight="bold" text-anchor="middle" fill="#FFE0E0">CORRELACIONADO</text>

  <rect x="40" y="465" width="440" height="55" rx="8" fill="#fff0f0" stroke="#cc4444" stroke-width="1.5"/>
  <text x="260" y="488" font-size="14" font-weight="bold" text-anchor="middle" fill="#cc0000">Resultado: identidade exposta</text>
  <text x="260" y="507" font-size="12" text-anchor="middle" fill="#555">Analista: 1.0 BTC → ~0.98 XMR → VOCÊ</text>

  <!-- ===== RIGHT SIDE: COM DEFESA ===== -->
  <text x="820" y="88" font-size="19" font-weight="bold" text-anchor="middle" fill="#007700">✅  COM DEFESA</text>

  <!-- Fragmented swaps -->
  <rect x="570" y="105" width="480" height="65" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="810" y="130" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d5a2d">Dia 1  →  0.4 BTC  →  eigenwallet</text>
  <text x="810" y="152" font-size="12" text-anchor="middle" fill="#555">fragmento 1 — valor irregular</text>

  <line x1="810" y1="170" x2="810" y2="195" stroke="#82b366" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="910" y="185" font-size="12" fill="#82b366" font-style="italic">48h+</text>

  <rect x="570" y="198" width="480" height="65" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="810" y="223" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d5a2d">Dia 3  →  0.3 BTC  →  eigenwallet</text>
  <text x="810" y="245" font-size="12" text-anchor="middle" fill="#555">fragmento 2 — valor diferente</text>

  <line x1="810" y1="263" x2="810" y2="288" stroke="#82b366" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="910" y="278" font-size="12" fill="#82b366" font-style="italic">48h+</text>

  <rect x="570" y="291" width="480" height="65" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="810" y="316" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d5a2d">Dia 5  →  0.5 BTC  →  eigenwallet</text>
  <text x="810" y="338" font-size="12" text-anchor="middle" fill="#555">fragmento 3 — total: 1.2 BTC em 3 partes</text>

  <!-- Success box -->
  <rect x="570" y="380" width="480" height="150" rx="12" fill="#007700" stroke="#005500" stroke-width="2.5"/>
  <text x="810" y="413" font-size="17" font-weight="bold" text-anchor="middle" fill="#FFFFFF">✅  ABCTracer falha:</text>
  <text x="810" y="438" font-size="14" text-anchor="middle" fill="#CCFFCC">3 transações separadas</text>
  <text x="810" y="460" font-size="14" text-anchor="middle" fill="#CCFFCC">3 horários diferentes (dias)</text>
  <text x="810" y="482" font-size="14" text-anchor="middle" fill="#CCFFCC">3 valores irregulares</text>
  <text x="810" y="506" font-size="16" font-weight="bold" text-anchor="middle" fill="#EEFFEE">NÃO CORRELACIONADO</text>

  <rect x="570" y="548" width="480" height="55" rx="8" fill="#f0fff0" stroke="#82b366" stroke-width="1.5"/>
  <text x="810" y="571" font-size="14" font-weight="bold" text-anchor="middle" fill="#007700">Resultado: privacidade mantida</text>
  <text x="810" y="590" font-size="12" text-anchor="middle" fill="#555">Analista não consegue linkar fragmentos XMR ao dono</text>

  <!-- Bottom rules -->
  <rect x="40" y="620" width="1020" height="45" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="550" y="640" font-size="14" font-weight="bold" text-anchor="middle" fill="#7a5a00">📋  Regras: (1) Mínimo 3 fragmentos  (2) Mínimo 24h entre swaps  (3) Valores irregulares, nunca redondos</text>
  <text x="550" y="657" font-size="12" text-anchor="middle" fill="#555">Ref: arXiv:2504.01822 — "Address-based Cross-chain Tracing for Bitcoin-Monero Atomic Swaps"</text>
</svg>
